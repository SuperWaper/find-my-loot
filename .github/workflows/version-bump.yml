name: Auto-bump version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Bump version
        run: |
          # Lire la version actuelle avec jq
          CURRENT_VERSION=$(jq -r '.version' version.json)
          echo "Version actuelle: $CURRENT_VERSION"

          # Parser la version (major.minor.patch)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          echo "Major: $MAJOR, Minor: $MINOR, Patch: $PATCH"

          # Incrémenter: si patch < 9, incrémenter patch, sinon réinitialiser patch et incrémenter minor
          if [ "$PATCH" -lt 9 ]; then
            PATCH=$((PATCH + 1))
          else
            PATCH=0
            MINOR=$((MINOR + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Nouvelle version: $NEW_VERSION"

          # Mettre à jour version.json avec jq
          jq --arg v "$NEW_VERSION" '.version = $v' version.json > version.json.tmp && mv version.json.tmp version.json

          # Mettre à jour README.md (ligne 3)
          sed -i "3s/.*/Version $NEW_VERSION/" README.md

          # Mettre à jour find-my-loot.html si la version y est
          sed -i "s/Version [0-9.]\+/Version $NEW_VERSION/g" find-my-loot.html

      - name: Check if files changed
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add version.json README.md find-my-loot.html
          NEW_VERSION=$(grep '"version"' version.json | grep -oP '"\K[^"]+')
          git commit -m "chore: bump version to $NEW_VERSION"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
